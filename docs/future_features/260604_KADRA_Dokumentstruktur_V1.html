    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

    }

    console.error('Bundle unpack error:', err);

weg Außen-Wallboxen<\u002Fa>\n<a class=\"sb-thema-link\" href=\"#thema-F.3-24235\">Zählerkonzept / Energieversorgungsschema L2<\u002Fa>\n<a class=\"sb-thema-link sb-link-active\" href=\"#thema-F.3-96425\">Zugang / Web-Anbindung / Betreibermodell<\u002Fa>\n<a class=\"sb-thema-link\" href=\"#thema-F.3-37683\">Vertrags-/Tarifmodell Ladeinfrastruktur<\u002Fa>\n<a class=\"sb-ukap-link\" href=\"#ukap-F.4\">F.4 – Zähler-Ummeldung Sudarshan<\u002Fa>\n<a class=\"sb-ukap-link\" href=\"#ukap-F.5\">F.5 – Klimatisierung Samsung C&amp;T<\u002Fa>\n<a class=\"sb-ukap-link\" href=\"#ukap-F.6\">F.6 – Gebäudeautomation (GLT) / DGNB<\u002Fa>\n<a class=\"sb-ukap-link\" href=\"#ukap-F.7\">F.7 – Vermietung / Bestandsmieter (nachrichtlich)<\u002Fa>\n<a class=\"sb-ukap-link\" href=\"#ukap-F.8\">F.8 – Erweiterung Fitseveneleven (L2, 1. OG)<\u002Fa>\n<\u002Fdiv>\n<a class=\"sb-kap-link sb-extra\" href=\"#aufgaben\"><span class=\"sb-dot\" style=\"background:var(--tertiary)\"><\u002Fspan>Aufgabenübersicht<\u002Fa>\n<a class=\"sb-kap-link sb-extra\" href=\"#abk\"><span class=\"sb-dot\" style=\"background:var(--text-tertiary)\"><\u002Fspan>Abkürzungen<\u002Fa>\n<\u002Fdiv><\u002Fnav>\n<button class=\"ds-reopen\" id=\"dsReopen\" title=\"Dokumentstruktur einblenden\" aria-label=\"Dokumentstruktur einblenden\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"18\" height=\"18\" x=\"3\" y=\"3\" rx=\"2\"><\u002Frect><path d=\"M15 3v18\"><\u002Fpath><path d=\"m8 9 3 3-3 3\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n<main class=\"content\" id=\"content\">\n<header class=\"doc-header\">\n<div class=\"dh-eyebrow\">Planer Jour Fixe · HIS<\u002Fdiv>\n<h1 class=\"dh-title\">Protokoll zum Planer Jour Fixe Nr. 24<\u002Fh1>\n<div class=\"dh-grid\">\n<div class=\"dh-item\"><span class=\"dh-lbl\">Projekt<\u002Fspan><span class=\"dh-val\">hillsite Schwalbach<\u002Fspan><\u002Fdiv>\n<div class=\"dh-item\"><span class=\"dh-lbl\">Mieterin<\u002Fspan><span class=\"dh-val\">Sudarshan Germany Horizons GmbH<\u002Fspan><\u002Fdiv>\n<div class=\"dh-item\"><span class=\"dh-lbl\">Vermieterin<\u002Fspan><span class=\"dh-val\">RSE Grundbesitz und Beteiligungs-GmbH<\u002Fspan><\u002Fdiv>\n<div class=\"dh-item\"><span class=\"dh-lbl\">Datum<\u002Fspan><span class=\"dh-val\">03.06.2026<\u002Fspan><\u002Fdiv>\n<div class=\"dh-item\"><span class=\"dh-lbl\">Zeit<\u002Fspan><span class=\"dh-val\">12:31 – 13:49<\u002Fspan><\u002Fdiv>\n<div class=\"dh-item\"><span class=\"dh-lbl\">Ort<\u002Fspan><span class=\"dh-val\">per Teams<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"dh-aufgestellt\">Aufgestellt: Olaf Schüler, Hopro GmbH &amp; Co. KG, 03.06.2026<\u002Fdiv>\n<div class=\"teilnehmer\">\n<div class=\"tn-label\">Teilnehmer<\u002Fdiv><div class=\"tn-list\">\n<div class=\"tn-card tn-anw\"><span class=\"tn-k\" style=\"--tc:#154384\">RSE<\u002Fspan><span class=\"tn-name\">Niels Ohlsen<\u002Fspan><span class=\"tn-firma\">RSE Grundbesitz und Beteiligungs-GmbH<\u002Fspan><span class=\"tn-status\">x<\u002Fspan><\u002Fdiv>\n<div class=\"tn-card tn-teilw\"><span class=\"tn-k\" style=\"--tc:#94AF83\">KH<\u002Fspan><span class=\"tn-name\">Klaus Hannappel<\u002Fspan><span class=\"tn-firma\">Klaus Hannappel Architekt<\u002Fspan><span class=\"tn-status\">(zeitw.)<\u002Fspan><\u002Fdiv>\n<div class=\"tn-card tn-teilw\"><span class=\"tn-k\" style=\"--tc:#96B4C9\">BI<\u002Fspan><span class=\"tn-name\">Leon Paul<\u002Fspan><span class=\"tn-firma\">Brendel Ingenieure GmbH<\u002Fspan><span class=\"tn-status\">(zeitw.)<\u002Fspan><\u002Fdiv>\n<div class=\"tn-card tn-anw\"><span class=\"tn-k\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"tn-name\">Olaf Schüler<\u002Fspan><span class=\"tn-firma\">Hopro GmbH &amp; Co. KG<\u002Fspan><span class=\"tn-status\">x<\u002Fspan><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fheader>\n<section class=\"kap\" id=\"kap-A\" style=\"--kc:var(--secondary)\">\n<div class=\"kap-head\" data-toggle=\"kap\" data-target=\"kapbody-A\">\n  <span class=\"chev\">▸<\u002Fspan>\n  <span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">A – Organisation | Information<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body\" id=\"kapbody-A\">\n<div class=\"ukap\" id=\"ukap-A.s1\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-A.s1\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Sitzungsorganisation / Fortführung der Planer-JFx-Reihe<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-A.s1\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#21|A.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">RSE bittet, die Planer-JFx-Reihe nach \nAbschluss des Mieterausbaus Sudarshan fortzuführen. Hintergrund: \nanschließend stehen Themen in der Bestandsfläche auf L4 sowie ggf. \nUmsortierungen im EG L2 und ein möglicher Umzug eines Bestandsmieters \nan.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-A.s2\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-A.s2\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Statik-Unterlagen / Archivrecherche<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-A.s2\">\n<div class=\"entries\">\n<div class=\"entry entry-done\">\n  <div class=\"entry-id\">#23|A.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">28.05.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-done\" title=\"erledigt\">☑<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Suche nach den Statik-Ordnern: RSE prüft in \nden eigenen Unterlagen; Hr. Noy ist sich sicher, dass die Statik \nvorhanden sein müsste. RSE gibt bis morgen Vormittag (28.05.2026) \nRückmeldung. Im RSE-Archiv (Keller) liegt zudem Material zur \nUrsprungsstatik; RSE leitet dies nachrichtlich weiter.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-done\">\n  <div class=\"entry-id\">#23|A.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">28.05.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-done\" title=\"erledigt\">☑<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Vorgehensweise: Vorhandene Statik-Ordner \nwerden eingescannt, um Verzögerungen zu vermeiden. HOP nimmt die Ordner \nmit, sofern die Übergabe bis spätestens 11:30 Uhr erfolgt (Theis-Termin \nauf morgen 11:00 Uhr verschoben). Dienstleister Reproplan (Schmidstraße)\n wird genutzt; RSE hat dort ein Kundenkonto (noch auf „Phoenix“ \ngelistet, ggf. umzustellen). Abgleich der von Fr. Lissner fotografierten\n Ordnerrücken mit dem tatsächlichen Inhalt ist noch zu klären.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-A.s3\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-A.s3\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Werbeanlage Sudarshan (Nordfassade)<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-A.s3\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#23|A.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Nachrichtlich: Die Werbeanlage für Sudarshan\n wurde an der Nordfassade montiert; an der Werbetafel zur Landstraße \nwurde die Box für die spätere Logomontage abgenommen. Eine Rückfrage von\n HEICO zur Stromzuleitung hatte HOP erreicht. RSE bestätigt: Beleuchtung\n der Werbeanlage läuft auf Allgemeinstrom (RSE), nicht auf den \nMieterzähler; Wahl des Stromkabels unkritisch. Kein Handlungsbedarf für \nHOP.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-A.s4\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-A.s4\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Ressourcen- / Projektstrukturplanung Bestandsthemen<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-A.s4\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|A.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Mit Abschluss des Mieterausbaus Sudarshan \nrücken die übergeordneten Property-Themen (Ladeinfrastruktur, \nZählerkonzept/Energieversorgungsschema L2, GLT, DGNB, Klimatisierung \nSamsung C&amp;T) in die Bearbeitung. BI weist darauf hin, dass die \neinzelnen Vorgänge zunächst aufzudröseln und mit Projektnummern zu \nhinterlegen sind. Verfahren: Abstimmung zu Projektzuordnung und \nKapazitäten zwischen BI (Hr. Schubert/Hr. Paul), RSE (Hr. Noy) und HOP.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|A.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">BI stellt eine Auflistung der offenen \nProperty-/Bestandsaufgaben zusammen als Grundlage für die Kapazitäts- \nund Projektnummern-Abstimmung.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|A.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Hinweis BI: Kapazität BI im Juni/Juli ca. \nein Tag pro Woche; zusammenhängende Blöcke sind schwierig. \nRessourcenplanung im Dreieck BI/RSE/HOP abzustimmen.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"kap\" id=\"kap-B\" style=\"--kc:var(--tag-5)\">\n<div class=\"kap-head\" data-toggle=\"kap\" data-target=\"kapbody-B\">\n  <span class=\"chev\">▸<\u002Fspan>\n  <span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">B – Qualitäten | Planung<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body\" id=\"kapbody-B\">\n<div class=\"ukap\" id=\"ukap-B.1\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-B.1\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">B.1 – Objektplanung / Bauablauf<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-B.1\">\n<h4 class=\"thema\" id=\"thema-B.1-66189\">Plan-Doku Sudarshan-Fläche<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#21|B.1.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Der von KH übergebene Plan mit den \nRaumnummern ist abschließend für die Doku. Alle Decken-Änderungen sind \nübernommen. Zwei vor Ort verschobene Bodentanks fließen nach Sichtung \ndurch KH ggf. nach.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-B.1-2965\">Mängel und Restleistungen Sudarshan-Fläche<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.1.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"minitag\" style=\"--tc:#968B79\">HEICO<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Beschilderung Fluchtweg: HOP hat HEICO (Hr. \nJungermann) die noch fehlenden Schilder mitgeteilt \n(Wartebereich/Sammelpunkt, behindertengerechte Fluchtwegschilder an der \nTür, inkl. Link/Bezugsquelle). KH weist auf ein zusätzlich \nanzubringendes (unbeleuchtetes) Fluchtwegschild im Bereich des Fingers \nhin — Position im Brandschutzplan an der Stelle, an der die Fenster in \ndie Brandwand eingebaut wurden; Pfeilrichtung in Türöffnungsrichtung \n(Fluchtweg nach unten). Anbringung an der Decke (Kettchen/Haken).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.1.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><span class=\"minitag\" style=\"--tc:#968B79\">HEICO<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Jalousie mit mechanischem Defekt: Eine \nJalousie reagiert auf die Steuerung (kippt), fährt aber nicht hoch — \nmechanisches Problem an der Außenseite. Bearbeitung über HEICO \n(Steigereinsatz). RSE prüft, ob mit weiteren noch offenen \nJalousie-Arbeiten kombinierbar. HOP übermittelt Hr. Jungermann (HEICO) \ndie Ortsbeschreibung.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.1.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Jalousiesteuerung KNX: HOP war mit Hr. \nGrabowski (Elektro Klein) vor Ort. Defekte Aktoren wurden bestellt. Laut\n Hr. Rücker-Klapper (Sudarshan) sind die Aktoren zwischenzeitlich vor \nOrt gewesen und bereits eingebaut. HOP klärt mit Hr. Grabowski, ob die \nJalousie-Funktion getestet wurde und ordnungsgemäß läuft.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-B.1-47084\">Materialeigenschaften Teppichboden (Brandschutz)<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.1.04<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#94AF83\">KH<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">JZ hat eine Leistungserklärung nach \nBauproduktverordnung bzw. ein Prüfzeugnis (mindestens „normal \nentflammbar“) für den eingebauten Teppichboden angefordert. KH hat das \nProduktblatt geprüft: Der Teppichboden ist gemäß genannter Normierung \nals „schwer entflammbar“ klassifiziert (entspricht damit einem höheren \nNiveau). KH stellt JZ den Nachweis zur Verfügung.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-B.2\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-B.2\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">B.2 – Fachplanung ELT | IT<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-B.2\">\n<h4 class=\"thema\" id=\"thema-B.2-9306\">IT-Dosen Druckerraum (Sudarshan)<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.2.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><span class=\"minitag\" style=\"--tc:#E88E5A\">Klein<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Im Druckerraum ist der Bestands-Bodentank \nzwar vorhanden, führt jedoch nur Strom und keine IT-Dosen. Der Mangel \nwurde bei der Mängelbegehung nicht erkannt (nicht alle Bodentanks \ngeöffnet). Vorgehensweise: Aus dem Bodentank des benachbarten \nGarderobenraums (vier Dosen) werden zwei IT-Dosen unter der Wand in den \nDruckerraum gezogen. Hr. Guja (Klein) hatte dies als aufwändig \neingeschätzt. Interimslösung: Drucker steht derzeit in der Garderobe. BI\n spricht den Punkt mit Hr. Guja (Klein) an.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-B.2-48910\">Tischsprechstelle / Türsprechanlage<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-done\">\n  <div class=\"entry-id\">#23|B.2.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-done\" title=\"erledigt\">☑<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Status Tischsprechstelle: Hr. Schubert (BI) \nhatte Klein die Unterlagen zugesandt; eine Rückmeldung von Klein liegt \nbisher nicht vor. Hr. Baron (Klein) hat die Bearbeitung an einen \nKollegen weitergegeben — vermutlich Hr. Grabowski (Klein), der die \nTürsprechanlage seinerzeit ausgeführt hat. Zu klären ist die Ausführung \nder Sprechstelle (mit/ohne Videomodul); offen, ob die Sprechstelle in \nder Säule nach der Drehtür (Besucheranmeldung) ein Videomodul erhält. BI\n hakt bei Klein nach.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|B.2.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Status Klingel-/Sprechanlage: HOP ist bei \nHr. Baron (Klein) nachgefasst (Hr. Baron reagiert nicht auf E-Mails). \nHr. Baron kümmert sich und prüft ein alternatives Klingelmodul mit mehr \nTasten für die Säule. Hintergrund: vorhandene Klingelfelder sind groß; \nein Ausbau auf mehr Tasten ist sinnvoll, da im L4 theoretisch sieben \nEinheiten bestehen und mit weiteren Mietern zu rechnen ist. Die \nSprechstelle selbst hat Hr. Baron vermutlich auf Lager.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|B.2.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Vorschlag BI: Module von Elcom verfügbar als\n 2-/4-Tasten-Variante, ggf. auch ältere Touch-Display-Lösung (im Bestand\n des hillsite teils vorhanden), die ein Durchsuchen mehrerer Einheiten \nerlaubt. Tendenz: Umstellung von der 4er- auf eine 8er-Lösung, ggf. mit \nAufschaltung Haustechnik. BI sucht beim Hersteller passende Module \nheraus.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|B.2.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#E88E5A\">Klein<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Umsetzung: Hr. Guja (Klein) ist diese Woche im Urlaub; Bearbeitung frühestens nächste Woche möglich.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-B.3\">\n<div class=\"ukap-head collapsed\" data-toggle=\"ukap\" data-target=\"ukapbody-B.3\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">B.3 – Genehmigung / Brandschutz<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body collapsed\" id=\"ukapbody-B.3\">\n<h4 class=\"thema\" id=\"thema-B.3-34337\">Baugenehmigung Bauaufsicht MTK<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#23|B.3.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#94AF83\">KH<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">fortlaufend<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">KH war in der Vorwoche bei Hr. Bank \n(Bauaufsicht) und hat den Stand der Genehmigung erfragt. Hr. Bank sagte \nzu, den Vorgang vor seinem Urlaub (Beginn in ca. zwei bis drei Wochen) \nabzuarbeiten. Aktueller Stand: Eine Inbetriebnahme erfolgt derzeit ohne \nvorliegende Genehmigung; alle Beteiligten — insbesondere der Brandschutz\n (JZ) — haben bestätigt, dass über die bereits besprochenen Restpunkte \nhinaus nichts zu beanstanden ist. Dieser Umstand ist allen Beteiligten \nbewusst.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|B.3.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#94AF83\">KH<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Status Genehmigung Sudarshan-Fläche: \nweiterhin offen. KH sieht für diese Woche keine erneute Nachfrage vor, \nwill in der nächsten Woche erneut bei der Bauaufsicht nachhalten.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-B.3-3504\">Brandschutz-Dokumentation Sudarshan / Liste JZ<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.3.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><span class=\"minitag\" style=\"--tc:#E88E5A\">Klein<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Durchsprache der JZ-Dokumentationsliste \n(Sudarshan), Einzelpositionen: 1. Brandmeldeanlage (BMA): \nErrichtererklärung von Klein liegt vor — akzeptiert. 2. Aufschaltung \nneuer Linien: laut BI in der Errichterbescheinigung enthalten; \nLaufkarten aktualisiert; Bestätigung bei Hr. Baron (Klein) nachgehalten.\n 3. Sprachalarmierung (SAA/ELA): Klein bestätigt „funktionsfähigen \nZustand“; Messprotokoll Lautstärke/Schall fehlt — laut LV geschuldet, \nnachzufordern. 4. Sicherheitsbeleuchtung: keine Änderung; \nErrichterbescheinigung genügt; Prüfbericht 02/2026 liegt vor. 5. \nSicherheitsstromversorgung (Keller): keine Änderung; kein Prüfbericht \nerforderlich. 6. Brandfallsteuermatrix: keine baulichen Änderungen, nur \nLinien erweitert. 7. Innerer Blitzschutz / Potenzialausgleich: neue \nStromkreise aufgelegt — Errichterbescheinigung Klein erforderlich, \nfehlt. 8. Rettungszeichenleuchten: vorhanden, funktionsfähig. 9. \nKabelschott: Verwendbarkeitsnachweis/Übereinstimmungserklärung fehlen; \nSchottbuch von Klein zu übersenden.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|B.3.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">HOP übersendet BI die aktualisierte JZ-Liste\n erneut (auch als SharePoint-Link mit Unterlagen). BI geht mit der Liste\n auf Hr. Baron (Klein) zu und dringt auf zeitnahe Lieferung der \nfehlenden Nachweise. Ziel: Sobald die Genehmigung vorliegt (in ca. zwei \nbis drei Wochen), kann das vollständige Paket an JZ übergeben werden.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|B.3.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-status\">Status<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Status Konformitätsbescheinigungsliste: Es \nfehlen weiterhin einzelne Nachweise. JZ muss noch nachliefern; die \nUnterlagen vom Elektriker (Klein) sind weiterhin zu dünn. HOP hatte auf \neinen aktuellen Sachstand von BI gehofft; BI war zu Beginn der Sitzung \nnicht zugeschaltet.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-B.3-1547\">Feuerwehrpläne / Aktualisierung gebäudeweit<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#23|B.3.04<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Die Feuerwehrpläne (vorgehalten im \nHEICO-Raum) sind alle zwei Jahre auf Übereinstimmung mit dem Bestand zu \nprüfen. Im Bereich Sudarshan stimmen sie durch den Umbau nicht mehr; JZ \nweist darauf hin, dass auch andere Bereiche veraltet sind. Eine \ngebäudeweite Aktualisierung ist aufwändig (JZ schätzt ca. eine Woche). \nVorgehensweise zu klären: mindestens Geschoss Sudarshan aktualisieren; \nFitseveneleven ggf. in Eigenverantwortung; übriger Bestand prüfen. RSE \nhält Rücksprache mit Hr. Noy. JZ ist grundsätzlich bereit.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"kap\" id=\"kap-C\" style=\"--kc:var(--tag-2)\">\n<div class=\"kap-head\" data-toggle=\"kap\" data-target=\"kapbody-C\">\n  <span class=\"chev\">▸<\u002Fspan>\n  <span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">C – Kosten<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body\" id=\"kapbody-C\">\n<div class=\"ukap\" id=\"ukap-C.s1\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-C.s1\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Schlussabrechnung Jaeger<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-C.s1\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#21|C.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">offen<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Liste der Nachträge/offenen Positionen \nJaeger ist noch nicht vollständig und mit Jaeger noch nicht \ndurchgesprochen. HOP greift nicht ein, bevor die Liste vollständig ist.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-C.s2\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-C.s2\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Abrechnung / Dokumentation Klein<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-C.s2\">\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|C.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><span class=\"minitag\" style=\"--tc:#E88E5A\">Klein<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Dokumentation Klein (Hr. Baron) ist bisher \nzu dünn (einige DIN-A4-Blätter); BI hat dies bereits rückgemeldet. Die \nFunktionsbestätigung wurde vor Einbau der Lautsprecher verschickt. Es \nfehlt zudem die Werk-/Montageplanung (Wechsel-/Revisionsplanung). BI \nerwartet die Unterlagen spätestens zum Termin am Freitag (Klein bei BI \nim Büro, Aufmaß).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|C.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Angebotsverfolgung Klein: Rückmeldung Klein \nauf die Angebotsprüfung (Anmerkungen BI) fehlt weiterhin; Fitseveneleven\n wurde in CC informiert und hat nachgefragt. BI hakt bei Hr. Baron \n(Klein) nach, sobald telefonisch erreichbar.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#23|C.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\">Fr (29.05.2026)<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Aufmaß-/Abrechnungstermin Klein/BI: Hr. Baron (Klein) ist am Freitag bei BI im Büro in Frankfurt zur Abstimmung des Aufmaßes.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|C.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><span class=\"minitag\" style=\"--tc:#E88E5A\">Klein<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Aufmaß-/Abrechnungstermin Klein/BI steht für\n die kommende Woche an (Verschiebung gegenüber dem ursprünglich für \n29.05. geplanten Termin).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"kap\" id=\"kap-D\" style=\"--kc:var(--tag-4)\">\n<div class=\"kap-head collapsed\" data-toggle=\"kap\" data-target=\"kapbody-D\">\n  <span class=\"chev\">▸<\u002Fspan>\n  <span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">D – Termine<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body collapsed\" id=\"kapbody-D\">\n<div class=\"ukap\" id=\"ukap-D.s1\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-D.s1\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Schlüsseltermine kommende Wochen<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-D.s1\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|D.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Kommende Woche: Aufmaß-/Abrechnungstermin Klein bei BI (siehe C.01).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|D.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Kommende Woche: BI plant Vor-Ort-Termin (ca.\n halber Tag) zur Aufnahme des Energieversorgungs-/Zählerschemas, der \nLeitungsabgänge sowie der LAN-Anbindung der Wallboxen (siehe F.3).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|D.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\">16.06.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">RP-Prüfung BI (Hr. Paul) am 16.06.2026; danach DGNB Registered Professional (siehe F.6).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"kap\" id=\"kap-E\" style=\"--kc:var(--tag-6)\">\n<div class=\"kap-head\" data-toggle=\"kap\" data-target=\"kapbody-E\">\n  <span class=\"chev\">▸<\u002Fspan>\n  <span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">E – Vertragswesen | Rechtliche Themen<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body\" id=\"kapbody-E\">\n<div class=\"ukap\" id=\"ukap-E.s1\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-E.s1\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Bauleistungsversicherung AXA<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-E.s1\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#21|E.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">29.05.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Vertraglich keine Verlängerung der \nBauleistungsversicherung erforderlich; Endabrechnung mit Stand Bausumme \nan AXA. Versicherung endet zum 29.05.2026.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-E.s2\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-E.s2\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">Mietvertragspflicht Ladestation Sudarshan<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-E.s2\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#22|B.5.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Laut Mietvertrag schuldet RSE dem Mieter \nSudarshan eine Elektroladestation (Außenbereich). Die vorhandenen \nWallboxen waren ursprünglich auf die Wandlerzählung des Mieters Samsung \naufgelegt; seit dessen Auszug nicht mehr aktiv. Servicebericht zur \nInbetriebnahme liegt vor. Zugangskonfiguration unklar. Umsetzungsstand \nund Optionen siehe F.3.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#23|E.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Der für Sudarshan geschuldete \nAußenstellplatz mit Lademöglichkeit ist noch nicht beschildert/aktiviert\n (RSE hat dies bei Sudarshan angesprochen). Sudarshan nimmt den Betrieb \nzum 01.06.2026 auf; eine rasche Übergangslösung ist anzustreben. \nTechnische/abrechnungsseitige Umsetzung siehe F.3.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"kap\" id=\"kap-F\" style=\"--kc:var(--tag-3)\">\n<div class=\"kap-head\" data-toggle=\"kap\" data-target=\"kapbody-F\">\n  <span class=\"chev\">▸<\u002Fspan>\n  <span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">F – Property Themen<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body\" id=\"kapbody-F\">\n<div class=\"kap-hinweis\">Übergeordnete, nicht Sudarshan-spezifische \nBestands- und Objektthemen (Gebäude hillsite gesamt). Punkte mit \nkonkretem Bezug auf den Mietbereich Sudarshan (L4-2.OG) verbleiben in \nA–E.<\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.1\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-F.1\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.1 – Betonsanierung Tiefgarage<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-F.1\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.1.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Aktueller Stand: Hr. Beresheim hat die \nMaßnahme geprüft und sein Okay gegeben. Statik ist übergeben; keine \nnegativen Rückmeldungen. RSE (Fr. Lissner) hat die Unterlagen zur \nVerfügung. Angebot steht aus. Der Vorgang läuft.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.2\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-F.2\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.2 – Fassade / Fenstertausch<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-F.2\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.2.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">In dieser Sitzung keine Einzelpunkte besprochen.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.3\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-F.3\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.3 – Ladeinfrastruktur<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-F.3\">\n<h4 class=\"thema\" id=\"thema-F.3-14721\">Wallboxen / Angebot Klein (Status)<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#20|B.2.05<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">13.05.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Angebot Klein für die Ladeboxen liegt \nweiterhin nicht vor (Begründung Klein: Schneider Electric liefere keine \nGrundlage; von BI als nicht plausibel bewertet). RSE telefoniert direkt \nmit Hr. Baron.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#21|B.2.08<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">offen<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Mieter wird das Angebot offen gelegt (Open Book) — entspricht bisheriger Umgangspraxis bei Umbauten.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#21|B.2.09<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Risiko: Sollte Klein/Schneider weiterhin \nkeine Grundlage liefern, Installation auch ohne finales Angebot \nvorbereiten. Alternativszenario (OCPP-konformer Fremdhersteller) halten.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-F.3-15279\">Zähler-/Leitungsweg Außen-Wallboxen<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-done\">\n  <div class=\"entry-id\">#23|F.3.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#E88E5A\">Klein<\u002Fspan><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">30.05.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-done\" title=\"erledigt\">☑<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Klärung Zähler-/Leitungsweg: Endpunkt und \nZählerzuordnung der Wallbox-Zuleitung sind festzustellen. Elektro Klein \nklärt bzw. baut am Samstag (vsl. 30.05.2026) so um, dass der \nLeitungsendpunkt feststeht. BI recherchiert parallel die \nBestandsunterlagen (Anlagenschema; verteilt über drei Projekte, Hr. \nSchubert hat Überblick). Hr. Noy (RSE): Ladepunkte an zwei \nUnterverteilungen, ein Zähler; Zusammenhang mit L2/Wandlerzählung \nSamsung unklar.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.3.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Ergebnis Zählerklärung: Die zehn Ladepunkte \n(zwei Unterverteilungen) laufen aktuell auf die Wandlermessung des \nehemaligen Mieters Samsung im leerstehenden L2; kein separater Zähler, \nvoll mit aufgelegt. Bezeichnungen „Ladestation 1/2“ im Schaltschrank \nmeinen Gruppe 1/Gruppe 2, nicht Einzelsäulen — beide Gruppen laufen über\n die Wandlermessung. Der Strom wird derzeit von RSE getragen.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.3.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Vorgehensweise Interimslösung: Da der Strom \nbereits über die (RSE-getragene) Wandlermessung läuft, kann eine Wallbox\n kurzfristig dort betrieben werden; im ersten Schritt ist die \nZählerzuordnung zweitrangig („Hauptsache Strom drauf“). Die spätere \nUmstellung auf einen eigenen RSE-Zähler erfolgt an einem Samstag (Umbau \nca. 3–4 Std.; kritisch ist Anmeldung/Setzen des Zählers, nicht der Umbau\n selbst). Die Abrechnung gegenüber Mietern läuft perspektivisch über das\n Süwag-Modell (Hr. Krämer).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-risiko\">Risiko<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Risiko: Endpunkt/LAN-Anbindung der Wallboxen\n vor Ort noch nicht aufgenommen — BI war beim Samstagstermin wegen \nlaufender Grundreinigung nicht im Parkhaus. Zudem ist das gesamte \nEnergieversorgungs-/Zählerschema veraltet (letzter Stand BI 2019, \nzwischenzeitliche Arbeiten Fa. Bär); Beschriftung und Abgänge sind \nunklar. Aufnahme bei Vor-Ort-Termin kommende Woche (siehe D.02).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-F.3-24235\">Zählerkonzept / Energieversorgungsschema L2<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.3.04<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Übergeordnetes Thema: Das \nZählerkonzept/Energieversorgungsschema für L2 ist aufzubrechen. L2 war \nkomplett Samsung; aktuell läuft auch der Verbrauch von Fitseveneleven \n(L1/L2, 4. OG) vermutlich noch über den ehemaligen Samsung-Zähler (auf \nRSE). Zieldefinition: jede Etage einzeln zählbar machen, statt nur das \n4. OG abzuzweigen. Abstimmung mit Samsung läuft; eine Stromschenkung \nsoll vermieden werden.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.05<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">BI nimmt bei Vor-Ort-Termin kommende Woche \ndie Leitungsabgänge im Detail auf, um das Schema aufzuräumen (siehe \nD.02). Priorität: zunächst Funktionsfähigkeit der Boxen herstellen; das \nGesamtschema ist „nice to have“ und muss nicht im Juni fertig sein.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-F.3-96425\">Zugang / Web-Anbindung / Betreibermodell<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#23|F.3.04<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Zugang/Programmierung Wallboxen: Bei \nvorhandener Web-Anbindung kann der Haustechniker (HEICO) die \nFreischaltung selbst vornehmen; andernfalls muss Schneider die Box nach \nKundenwunsch umprogrammieren (gesonderte Position). RSE recherchiert \nintern bei HEICO und im Rückgabevorgang Samsung, ob Zugriff/Zugangsdaten\n zur Web-Anwendung (Schneider/Wallbox) übergeben wurden oder mit Samsung\n verloren gingen; ggf. direkte Rückfrage bei Samsung.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.06<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Stand Zugangsdaten: HEICO hat keinen Zugang \nzur Wallbox-Steuerung; die Steuerung lief seinerzeit über den Mieter \nSamsung. Es gibt weiterhin guten Kontakt zu Samsung. RSE fragt bei \nSamsung nach den Zugangsdaten/Kennwörtern zur Schneider-Web-Anbindung \n(noch nicht erfolgt). Bei vorhandenen Zugangsdaten kann Süwag (Hr. \nKrämer) die Boxen übernehmen/umstellen; andernfalls ist zu prüfen, ob \nein Werksreset möglich ist (Wallboxen gehören inzwischen RSE, nicht mehr\n Samsung).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.07<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">LAN-/Internet-Anbindung: Es muss ein \nAnbindungskabel der Wallboxen geben (Endpunkt unbekannt). \nAnschlussmöglichkeit vermutlich im Hausmeisterraum (RSE-Internetzugang /\n zusätzlicher DSL-Anschluss, dessen Verlauf intern unklar ist). BI prüft\n vor Ort, wohin das Kabel führt. Master-Slave-Prinzip der Säulen (eine \nMaster, je vier Slaves); ggf. zwei LAN-Anschlüsse oder Lösung über \nSwitch. Alternativ SIM-Karten-Lösung möglich; HOP/BI tendieren zur \nKabelanbindung.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.08<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Bedarf Süwag (Hr. Krämer) von RSE/HOP: (1) \nAbstimmung/Bestätigung, ob Betrieb über die Wandlermessung für ihn in \nOrdnung ist; (2) Info, ob Zugang zur Web-Anbindung vorhanden ist bzw. ob\n er diese zwingend benötigt; (3) Vertrags-/Lademodell. BI telefoniert \nmit Hr. Krämer und stellt diese Fragen, inkl. benötigter Komponenten für\n die Wieder-Inbetriebnahme. Hr. Krämer hatte aktualisierte Folie \ngeschickt; auf Okay folgt ein konkretes Angebot.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<h4 class=\"thema\" id=\"thema-F.3-37683\">Vertrags-/Tarifmodell Ladeinfrastruktur<\u002Fh4>\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.3.09<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Tendenz Tarifmodell: Nutzergruppen-Tarif \n(RSE-intern), für alle Mieter bevorzugt, so justiert, dass keine \nRückvergütung entsteht (kein Verdienst, steuerlich risikoarm). Inhaber \ndes Stromliefervertrags bleibt in allen Varianten RSE. Freischaltung je \nNutzer über RFID-Karte oder App, ausgegeben durch das Facility \nManagement. Optional Roaming/Flottenkarten (z. B. ADAC, IONITY) parallel\n möglich — als reine Option gegenüber Sudarshan anzufragen, nicht \nzwingend umzusetzen.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.10<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">RSE stimmt das Tarifmodell intern (mit Hr. \nNoy) ab und übermittelt es der Steuerabteilung nur noch zur \nKenntnisnahme („funktionierende Lösung, kein Verdienst“), um das Thema \nzügig abzuschließen. RSE/HOP sprechen das Vorgehen im Nachgang der \nSitzung nochmals ab. Zähler wird in die laufende Stromausschreibung \n(Allgemeinstrom) eingebunden; offen, ob Einbindung in den Tarif oder \neigener Tarif für E-Ladeinfrastruktur.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.3.11<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">HOP geht auf Sudarshan zu und fragt, ob als \nÜbergangslösung eine RFID-Karte bzw. ein App-Zugang vom Hausmeister \nausreichend ist. Ergebnis fließt an Hr. Krämer (Süwag) zurück; dieser \nsoll Vertrag vorlegen und die Mindestvertragslaufzeit klären.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.4\">\n<div class=\"ukap-head collapsed\" data-toggle=\"ukap\" data-target=\"ukapbody-F.4\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.4 – Zähler-Ummeldung Sudarshan<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body collapsed\" id=\"ukapbody-F.4\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.4.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Sachstand: Die Wandlermessung Sudarshan \nwurde außer Betrieb genommen und durch neue Zähler ersetzt (drei Zähler \nSudarshan plus ein vierter für USV/Serverraum = vier neue Zähler; zudem \nein Zähler für RSE-Bereich). Zählerstände wurden beim Umbau \nfotografiert. Im Normalfall meldet Syna An-/Abmeldung automatisch.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.4.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">BI übermittelt HOP/RSE die Fotos der Zählerstände (Endstand alte Wandlermessung sowie neue Zähler).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.4.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#154384\">RSE<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">RSE teilt Sudarshan die neuen Zählernummern \nund -stände mit (Foto plus textliche Aufstellung), mit dem Hinweis, dass\n die Ab-/Anmeldung bei Syna automatisch erfolgt sein sollte; Sudarshan \nkann sich beim Stromlieferanten rückversichern.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.5\">\n<div class=\"ukap-head collapsed\" data-toggle=\"ukap\" data-target=\"ukapbody-F.5\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.5 – Klimatisierung Samsung C&amp;T<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body collapsed\" id=\"ukapbody-F.5\">\n<div class=\"entries\">\n<div class=\"entry entry-done\">\n  <div class=\"entry-id\">#23|F.5.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-done\" title=\"erledigt\">☑<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Thermografie-Messung im Bereich Samsung \nC&amp;T war vorgesehen; der Termin mit der Wärmebildkamera konnte nicht \nwie geplant stattfinden. Durchführung wird nachgeholt.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.5.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Ergebnis Vor-Ort-Aufnahme (L4-4.OG, „114“, \nzwei Geschosse über Sudarshan): In mehreren Räumen kommt keine bzw. zu \nwenig Kälteleistung an; eine komplette Deckenfläche im innenliegenden \nBereich (Teeküche, rechts vom K5) ist inaktiv. Fr. Deibele (Samsung \nC&amp;T) hatte die Haustechnik wiederholt auf die nicht funktionierende \nKühlung hingewiesen; eine Prüfung war bislang nur per Blick auf den \nGLT-Bildschirm erfolgt („alles läuft“).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.5.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Vorgehensweise: HOP hat Hr. Schubert (BI) \ngebeten, die letzten Bestandspläne des Vormieters Cheil (nicht Samsung \nC&amp;T, da Fläche 1:1 übernommen) herauszusuchen, um Volumenstromregler\n (Lüftung), Absperrventile (Kälte) und Pumpen zu lokalisieren und vor \nOrt einzeln abzuklopfen (möglicher hydraulischer Abgleich o. ä.).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.5.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Festlegung: Begutachtung/Instandsetzung mit \nWartungsfirma Kaya (ohnehin im Haus, reaktionsschnell) durchführen; Hr. \nJungermann (HEICO) direkt einbinden. Hinweis: Die Wartung durch Kaya hat\n offenbar nicht zuverlässig funktioniert.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.5.04<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Nachrichtlich: Ein zusätzliches \nUmluftkühlgerät für Samsung C&amp;T ist zunächst vom Tisch — der CEO \nmöchte keine Sonderbehandlung gegenüber anderen Mietern. Zunächst wird \ndie bestehende Kühlung instand gesetzt und das Verhalten beobachtet; ein\n Zusatzgerät bleibt nur als Rückfalloption.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.5.05<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">BI hat den Deckenbelegungsplan (Fa. Schmid) \nfür den betroffenen Bereich gefunden und sendet ihn HOP vorab zu. Der \nzugehörige Plan des Fingers (4. OG; Plannummer-Verwirrung „003“ vs. \nOG-Bezeichnung) wird noch herausgesucht und nachgereicht.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.6\">\n<div class=\"ukap-head collapsed\" data-toggle=\"ukap\" data-target=\"ukapbody-F.6\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.6 – Gebäudeautomation (GLT) / DGNB<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body collapsed\" id=\"ukapbody-F.6\">\n<div class=\"entries\">\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#22|B.2.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><span class=\"minitag\" style=\"--tc:#CDAD96\">Sauter<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">GLT-Dokumentation: Für die geplante \nWeiterentwicklung der GLT ist eine Dokumentation des Status quo \nerforderlich (Was kann die GLT aktuell? Welche Erweiterungsmöglichkeiten\n bestehen?). Vorgehen: Status quo → Ziel → Möglichkeiten.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.6.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#96B4C9\">BI<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Das GLT-Thema kann nun angegangen werden; Zuständigkeit bei BI (Hr. Paul).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.6.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\">16.06.2026<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">DGNB ist weiterhin nicht vom Tisch und zu \ngegebener Zeit erneut aufzunehmen. Hr. Paul (BI) hat am 16.06.2026 die \nRP-Prüfung und ist anschließend DGNB Registered Professional (erster \nSchritt; Auditor-Qualifikation separat, ca. 15.000 €).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.7\">\n<div class=\"ukap-head collapsed\" data-toggle=\"ukap\" data-target=\"ukapbody-F.7\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.7 – Vermietung / Bestandsmieter (nachrichtlich)<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body collapsed\" id=\"ukapbody-F.7\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.7.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Nachrichtlich: Panduit hat gekündigt und \nverlässt das hillsite; RSE plant eine Vorbegehung der Fläche. Ebenso \nzieht GMS Ende August aus (Fläche wird als gut vermietbar eingeschätzt).<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"ukap\" id=\"ukap-F.8\">\n<div class=\"ukap-head\" data-toggle=\"ukap\" data-target=\"ukapbody-F.8\">\n  <span class=\"chev\">▾<\u002Fspan>\n  <h3 class=\"ukap-title\">F.8 – Erweiterung Fitseveneleven (L2, 1. OG)<\u002Fh3>\n<\u002Fdiv>\n<div class=\"ukap-body\" id=\"ukapbody-F.8\">\n<div class=\"entries\">\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.8.01<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-info\">Info<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">RSE hat eine mögliche Erweiterung des \nFitnessstudios Fitseveneleven im 1. OG (L2, Fingerbereich) eingebracht. \nDie ursprünglich mit Fitseveneleven abgestimmte Grenze (bis „rote \nLinie“, Tageslichteinfall für die verbleibende Bürofläche) reicht deren \nPlanung nicht; Fitseveneleven plant bis an den Riegel. Die Fläche ist \naktuell nicht vermietet und wird für Fitseveneleven vorgehalten. Nicht \nzeitkritisch — Umsetzung frühestens 2027.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.8.02<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\">KW24-26<\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Aufgabenstellung an HOP: \nBrainstorming/Variantenbetrachtung Flächenzuschnitt unter \nBerücksichtigung Brandschutz, Rettungswege (zweiter Rettungsweg) und \nverbleibender Bürofläche. Erste Einschätzung HOP: Fluchtwege \ndarstellbar; zweiter Rettungsweg vermutlich über das benachbarte \nTreppenhaus bzw. über die Fassade (Anleiterung). Überlegung, den \nErweiterungsbereich bis an den Kernrand (Aufzugsvorraum/Treppenhaus, \nBereich unterhalb WC-Anlage) zu ziehen, um eine funktionsfähige \nBüroeinheit mit Treppenhausanbindung zu erhalten.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.8.03<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-aufgabe\">Aufgabe<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><span class=\"minitag\" style=\"--tc:#E199AA\">JZ<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">HOP holt das bestehende Brandschutzkonzept \nfür diesen Bereich ein und stimmt die Restriktionen mit JZ ab, bevor \nFlächenvarianten festgelegt werden.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-open\">\n  <div class=\"entry-id\">#24|F.8.04<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-risiko\">Risiko<\u002Fspan>\n      <span class=\"row-tags\"><span class=\"minitag\" style=\"--tc:#0E2D58\">HOP<\u002Fspan><\u002Fspan>\n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-open\" title=\"offen\">☐<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Risiko: Geplanter Kursraum erzeugt \nSchall/Erschütterung. Räume darüber sind aktuell leer (4. OG), unter dem\n fraglichen Bereich liegt teils Luftraum/Magistrale. Bauphysik \n(Lärmschutz nach oben/unten/seitlich, ggf. Schallschutzdecke und \nSpezialboden gegen Trittschall/Hohlbodenbelastung) ist vorab zu klären, \num Überraschungen zu vermeiden.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"entry entry-none\">\n  <div class=\"entry-id\">#24|F.8.05<\u002Fdiv>\n  <div class=\"entry-main\">\n    <div class=\"entry-meta\">\n      <span class=\"kat kat-festlegung\">Festlegung<\u002Fspan>\n      \n      <span class=\"entry-frist\"><\u002Fspan>\n      <span class=\"entry-status\"><span class=\"erl erl-none\">–<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"entry-text\">Verfahren: RSE will als \nöffentlich-rechtlicher Bauherr auftreten; eine Bauantragsplanung ist \nerforderlich. Mieterausbaukosten trägt Fitseveneleven (wie bisher: \neigenständiger Ausbau auf eigene Kosten, Begleitung durch KH/JZ im \nAuftrag RSE). HOP regt an, den Vorgang frühzeitig genehmigen zu lassen \n(Genehmigungszeiträume, Hr. Bank), auch wenn die Umsetzung erst 2027 \nerfolgt.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"kap\" id=\"aufgaben\" style=\"--kc:var(--tertiary)\">\n<div class=\"kap-head\" data-toggle=\"kap\" data-target=\"kapbody-aufgaben\">\n  <span class=\"chev\">▾<\u002Fspan><span class=\"kap-bar\"><\u002Fspan>\n  <h2 class=\"kap-title\">Aufgabenübersicht<\u002Fh2>\n<\u002Fdiv>\n<div class=\"kap-body\" id=\"kapbody-aufgaben\">\n<div class=\"filterbar\">\n<button class=\"pill pill-all\" data-tag=\"__all__\">Alle<\u002Fbutton>\n<button class=\"pill
